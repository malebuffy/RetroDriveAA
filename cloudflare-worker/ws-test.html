<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RetroDrive WS Relay Test</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; max-width: 900px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    input, select, button { padding: 8px; font-size: 14px; }
    input { min-width: 260px; }
    #log { white-space: pre-wrap; background: #111; color: #eee; padding: 12px; border-radius: 8px; min-height: 220px; }
  </style>
</head>
<body>
  <h2>RetroDrive WebSocket Relay Test</h2>

  <div class="row">
    <input id="base" value="wss://retrodrive.antoniadis.workers.dev/ws" />
    <input id="session" value="test" />
    <select id="role">
      <option value="phone">phone</option>
      <option value="car">car</option>
    </select>
    <button id="connect">Connect</button>
    <button id="disconnect">Disconnect</button>
  </div>

  <div class="row">
    <input id="message" placeholder="Message to send" value="hello" />
    <button id="send">Send</button>
    <button id="clear">Clear</button>
  </div>

  <div id="log">Ready.</div>

  <script>
    let ws = null;
    const logEl = document.getElementById('log');

    function log(line) {
      logEl.textContent += "\n" + line;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function buildUrl() {
      const base = document.getElementById('base').value.trim();
      const session = encodeURIComponent(document.getElementById('session').value.trim());
      const role = encodeURIComponent(document.getElementById('role').value);
      return `${base}?session=${session}&role=${role}`;
    }

    document.getElementById('connect').onclick = () => {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        log('Already connected/connecting.');
        return;
      }
      const url = buildUrl();
      log('Connecting: ' + url);
      ws = new WebSocket(url);
      ws.onopen = () => log('OPEN');
      ws.onmessage = (e) => log('RECV: ' + e.data);
      ws.onerror = () => log('ERROR');
      ws.onclose = (e) => log(`CLOSE code=${e.code} reason=${e.reason || '(none)'}`);
    };

    document.getElementById('disconnect').onclick = () => {
      if (ws) ws.close(1000, 'manual');
    };

    document.getElementById('send').onclick = () => {
      const msg = document.getElementById('message').value;
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log('Cannot send: socket not open');
        return;
      }
      ws.send(msg);
      log('SENT: ' + msg);
    };

    document.getElementById('clear').onclick = () => {
      logEl.textContent = 'Cleared.';
    };
  </script>
</body>
</html>
